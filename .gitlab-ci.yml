stages:
  - deploy

cache:
  paths:
  - vendor/
  - node_modules/

deploy_dev:
  stage: deploy
  script:
    - cdpre && cd project-lightning
    - git checkout dev
    - git pull
    - yarn install
    - npm run dev
    - composer install --no-dev && composer update --no-dev
    - php artisan migrate --force
    - php artisan route:cache
    - php artisan config:cache
    - php artisan view:cache
    - composer dump --optimize
  only: dev

    

